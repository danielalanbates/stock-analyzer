name: Auto-merge owner PRs

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'danielalanbates'
    runs-on: ubuntu-latest
    steps:
      - name: Auto-merge PR
        run: gh pr merge "${{ github.event.pull_request.number }}" --merge --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
